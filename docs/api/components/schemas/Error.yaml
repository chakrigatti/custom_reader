type: object
description: >
  Problem details object following RFC 7807. Returned with
  content-type `application/problem+json`.
properties:
  type:
    type: string
    format: uri
    description: URI identifying the problem type. Absent means "about:blank".
    example: "about:blank"
  title:
    type: string
    description: Short human-readable summary of the problem type.
    example: "Not Found"
  status:
    type: integer
    description: HTTP status code.
    example: 404
  detail:
    type: string
    description: Human-readable explanation specific to this occurrence.
    example: "Feed with id 42 does not exist."
required: [type, status, detail]
example:
  type: "about:blank"
  title: "Not Found"
  status: 404
  detail: "Feed with id 42 does not exist."
