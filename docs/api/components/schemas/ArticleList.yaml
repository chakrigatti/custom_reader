type: object
properties:
  data:
    type: array
    items:
      $ref: "../components/schemas/Article.yaml"
  total:
    type: integer
    description: Total number of articles matching the query.
  limit:
    type: integer
    description: Maximum number of articles returned.
  offset:
    type: integer
    description: Number of articles skipped.
required: [data, total, limit, offset]
