type: object
description: Request body for adding a new feed.
properties:
  url:
    type: string
    format: uri
    description: >
      URL of the feed or site to add. The server auto-detects the source type:
      RSS/Atom feed URLs are used directly, blog homepages are crawled for feed
      discovery, and X/Twitter handles or nitter URLs are converted to nitter
      RSS URLs.
    example: "https://news.ycombinator.com/rss"
additionalProperties: false
required: [url]
example:
  url: "https://news.ycombinator.com/rss"
