post:
  summary: Sync new articles for one feed
  description: >
    Fetches and stores new articles for the specified feed. Feeds with
    source_type `bookmark` return a 422 error. Deduplicates by URL so
    re-syncing a feed does not create duplicate articles.
  operationId: syncFeed
  tags: [Feeds]
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: Feed ID.
  responses:
    "200":
      description: Sync completed.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/FetchResult.yaml"
    "404":
      description: Feed not found.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "422":
      description: >
        Cannot sync a bookmark feed. Bookmark feeds do not have an upstream
        source to fetch from.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "502":
      description: Upstream server returned an error response while fetching the feed.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "503":
      description: Network failure while fetching the feed.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "500":
      description: Unexpected server error.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
