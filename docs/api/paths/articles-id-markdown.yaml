get:
  summary: Get article content as markdown
  description: >
    Returns the article's markdown content as plain text. Useful for piping to
    a pager or renderer without the full JSON envelope.
  operationId: getArticleMarkdown
  tags: [Articles]
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: Article ID.
  responses:
    "200":
      description: Markdown content of the article.
      content:
        text/markdown:
          schema:
            type: string
    "404":
      description: Article not found.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/Error.yaml"
