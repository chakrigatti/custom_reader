patch:
  summary: Rename a category
  operationId: renameCategory
  tags: [Categories]
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: Category ID.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/CategoryUpdate.yaml"
  responses:
    "200":
      description: Category renamed.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/Category.yaml"
    "404":
      description: Category not found.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "409":
      description: Category with new name already exists.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "500":
      description: Unexpected server error.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"

delete:
  summary: Delete a category
  operationId: deleteCategory
  tags: [Categories]
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: Category ID.
  responses:
    "204":
      description: Category deleted.
    "404":
      description: Category not found.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "500":
      description: Unexpected server error.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
