post:
  summary: Fetch new articles for one feed
  description: >
    Fetches and stores new articles for the specified feed. Feeds with
    source_type "bookmark" are skipped (returns 0 fetched). Deduplicates by URL
    so re-fetching a feed does not create duplicate articles.
  operationId: fetchFeed
  tags: [Feeds]
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: Feed ID.
  responses:
    "200":
      description: Fetch completed.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/FetchResult.yaml"
    "404":
      description: Feed not found.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "422":
      description: Feed could not be fetched (network error or HTTP failure).
      content:
        application/json:
          schema:
            $ref: "../components/schemas/Error.yaml"
