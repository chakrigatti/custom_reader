delete:
  summary: Remove a feed
  description: >
    Deletes a feed and all associated articles. Returns 403 if the feed ID is
    the sentinel bookmark feed (id=1, "Saved Articles"), which cannot be removed.
  operationId: deleteFeed
  tags: [Feeds]
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
      description: Feed ID.
  responses:
    "204":
      description: Feed deleted successfully.
    "403":
      description: >
        Forbidden. The sentinel "Saved Articles" feed (id=1) cannot be deleted.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "404":
      description: Feed not found.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/Error.yaml"
