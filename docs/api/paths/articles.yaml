post:
  summary: Save a bookmark article
  description: >
    Fetches the page at the provided URL, extracts its content, and saves it
    as a bookmark article under the "Saved Articles" feed. If no content could
    be extracted, the article is still stored and the response includes a
    `warning` field.
  operationId: saveArticle
  tags: [Articles]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/ArticleCreate.yaml"
  responses:
    "201":
      description: Article saved.
      headers:
        Location:
          description: URL of the newly created article resource.
          schema:
            type: string
            format: uri
      content:
        application/json:
          schema:
            $ref: "../components/schemas/Article.yaml"
    "400":
      description: Malformed request body.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "409":
      description: >
        Article with this URL already exists. The response includes an
        `existing_id` extension field with the ID of the existing article.
      content:
        application/problem+json:
          schema:
            allOf:
              - $ref: "../components/schemas/Error.yaml"
              - type: object
                properties:
                  existing_id:
                    type: integer
                    description: ID of the existing article.
    "415":
      description: Unsupported media type.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "422":
      description: Invalid URL scheme (must be `http` or `https`).
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "502":
      description: Upstream server returned an error response while fetching the page.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "503":
      description: Network failure while fetching the page.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "500":
      description: Unexpected server error.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"

get:
  summary: List articles
  description: >
    Returns articles filtered by the provided query parameters. The `source`
    and `feed_id` parameters are mutually exclusive — supplying both yields a
    422 error.
  operationId: listArticles
  tags: [Articles]
  parameters:
    - name: feed_id
      in: query
      required: false
      schema:
        type: integer
      description: >
        Filter to articles belonging to a specific feed. Mutually exclusive
        with `source`.
    - name: state
      in: query
      required: false
      schema:
        type: string
        enum: [unread, read, read_again]
      description: Filter to articles with the given reading state.
    - name: source
      in: query
      required: false
      schema:
        type: string
        enum: [bookmark]
      description: >
        Filter to bookmark articles. Mutually exclusive with `feed_id`.
    - name: tag
      in: query
      required: false
      schema:
        type: string
      description: Filter to articles with this tag name.
    - name: category_id
      in: query
      required: false
      schema:
        type: integer
      description: Filter to articles from feeds in this category.
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
      description: Maximum number of articles to return.
    - name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Number of articles to skip before returning results.
  responses:
    "200":
      description: Paginated list of articles matching the filters.
      content:
        application/json:
          schema:
            $ref: "../components/schemas/ArticleList.yaml"
    "422":
      description: >
        Invalid query parameters: both `source` and `feed_id` were supplied,
        or an invalid enum value was provided for `state`.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
    "500":
      description: Unexpected server error.
      content:
        application/problem+json:
          schema:
            $ref: "../components/schemas/Error.yaml"
