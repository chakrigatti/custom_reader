openapi: "3.1.0"

info:
  title: Reader API
  version: "2.0.0"
  description: >
    REST API for the custom RSS reader CLI app. The CLI is a thin HTTP client;
    all reads and writes go through this API, which persists data in a local
    SQLite database.
  contact:
    name: Reader API
    url: https://github.com/
  license:
    name: MIT

security: []

servers:
  - url: http://localhost:8000
    description: Local development server (uvicorn)

paths:
  /feeds:
    $ref: "./paths/feeds.yaml"
  /feeds/{id}:
    $ref: "./paths/feeds-id.yaml"
  /feeds/{id}/sync:
    $ref: "./paths/feeds-id-sync.yaml"
  /feeds/{id}/categories:
    $ref: "./paths/feeds-id-categories.yaml"
  /sync:
    $ref: "./paths/sync.yaml"
  /articles:
    $ref: "./paths/articles.yaml"
  /articles/{id}:
    $ref: "./paths/articles-id.yaml"
  /articles/{id}/tags:
    $ref: "./paths/articles-id-tags.yaml"
  /articles/{id}/tags/{tag_id}:
    $ref: "./paths/articles-id-tags-id.yaml"
  /categories:
    $ref: "./paths/categories.yaml"
  /categories/{id}:
    $ref: "./paths/categories-id.yaml"
  /tags:
    $ref: "./paths/tags.yaml"
  /tags/{id}:
    $ref: "./paths/tags-id.yaml"
  /opml/import:
    $ref: "./paths/opml-import.yaml"
  /opml/export:
    $ref: "./paths/opml-export.yaml"

components:
  schemas:
    Feed:
      $ref: "./components/schemas/Feed.yaml"
    Article:
      $ref: "./components/schemas/Article.yaml"
    FeedCreate:
      $ref: "./components/schemas/FeedCreate.yaml"
    ArticleCreate:
      $ref: "./components/schemas/ArticleCreate.yaml"
    ArticleUpdate:
      $ref: "./components/schemas/ArticleUpdate.yaml"
    FetchResult:
      $ref: "./components/schemas/FetchResult.yaml"
    Error:
      $ref: "./components/schemas/Error.yaml"
    FeedList:
      $ref: "./components/schemas/FeedList.yaml"
    ArticleList:
      $ref: "./components/schemas/ArticleList.yaml"
    SyncResultList:
      $ref: "./components/schemas/SyncResultList.yaml"
    Category:
      $ref: "./components/schemas/Category.yaml"
    CategoryCreate:
      $ref: "./components/schemas/CategoryCreate.yaml"
    CategoryUpdate:
      $ref: "./components/schemas/CategoryUpdate.yaml"
    CategoryList:
      $ref: "./components/schemas/CategoryList.yaml"
    FeedCategoryUpdate:
      $ref: "./components/schemas/FeedCategoryUpdate.yaml"
    Tag:
      $ref: "./components/schemas/Tag.yaml"
    TagCreate:
      $ref: "./components/schemas/TagCreate.yaml"
    TagList:
      $ref: "./components/schemas/TagList.yaml"
    OPMLImportResult:
      $ref: "./components/schemas/OPMLImportResult.yaml"
